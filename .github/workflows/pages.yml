name: Preview (GitHub Pages)

# プレビュー用の公開サイトを GitHub Pages に自動デプロイします。
# 公開URL: https://leesanxz.github.io/oasis_home/
# 対象ブランチへの push、または手動実行で公開します。
on:
  push:
    branches:
      - claude/oasis-site-renewal-1ttukj
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時に1つだけ。実行中のデプロイは中断せず完了させる。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Pages を自動で有効化（リポジトリ設定の手動変更を不要にする）
          enablement: true

      - name: Build (with base path for project pages)
        run: npm run build
        env:
          SITE_URL: https://leesanxz.github.io
          SITE_BASE: /oasis_home

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
